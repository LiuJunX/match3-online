<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水晶海洋 · 完整场景</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#0a0c10;min-height:100vh;display:flex;justify-content:center}
.scene{width:100%;max-width:520px;display:flex;flex-direction:column;overflow:hidden}
.sky-area{height:36px;flex-shrink:0;position:relative;
  background:linear-gradient(180deg,#0e3d6e,#1a5a8e 30%,#3088b8 60%,#58b0d4 85%,#88cce0 100%)}
.cloud{position:absolute;background:rgba(255,255,255,.4);border-radius:50%;filter:blur(6px)}
.board-area{position:relative;padding:0 4%;flex-shrink:0;
  background:linear-gradient(180deg,#88cce0,#b8dcd0 35%,#c8d4b8 65%,#a8c090 100%)}
.board-frame{background:linear-gradient(160deg,#8ac8bc,#6eb4a6,#5aa296,#4c928a);
  border-radius:14px;padding:5px;
  box-shadow:0 6px 24px rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.12),inset 0 -2px 0 rgba(0,0,0,.2)}
.board-grid{width:100%;background:linear-gradient(180deg,#d0c6b8,#c8bcae);
  border-radius:10px;display:grid;grid-template-columns:repeat(9,1fr);
  gap:1.5px;padding:3px;box-shadow:inset 0 2px 6px rgba(0,0,0,.1)}
.gc{display:flex;align-items:center;justify-content:center;border-radius:4px;
  background:rgba(186,176,162,.38);aspect-ratio:1;overflow:visible}
.gc svg{width:90%;height:90%;transition:transform .12s;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.28))}
.gc:hover svg{transform:scale(1.12)}
.gc.obs{background:rgba(155,136,112,.28)}
.obs-block{width:86%;height:86%;border-radius:18%;
  background:linear-gradient(145deg,#aa9470,#92805e,#7c6c50);position:relative;overflow:hidden;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.1),inset 0 -2px 0 rgba(0,0,0,.14),1px 2px 3px rgba(0,0,0,.18)}
.obs-block::before{content:'';position:absolute;top:0;left:0;width:44%;height:44%;background:rgba(255,255,255,.07);border-radius:18% 0 40% 0}
.obs-stamp{position:absolute;inset:24%;opacity:.16}
.garden-area{flex-shrink:0;background:linear-gradient(180deg,#78b060,#5a9844,#48883a,#3a7830)}
.hills{width:100%;height:44px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#a8c090,#88aa6e,#6e9a56)}
.hill{position:absolute;bottom:0;border-radius:50% 50% 0 0}
.hf{background:#8aaa70;opacity:.45}
.hn{background:#78a85a}
.wall{height:10px;background:linear-gradient(180deg,#c8b89c,#b0a084);margin:0 6%;border-radius:3px;
  box-shadow:0 2px 3px rgba(0,0,0,.1);position:relative}
.wall::before{content:'';position:absolute;top:-4px;left:-1%;right:-1%;height:5px;
  background:linear-gradient(180deg,#d8c8ac,#c4b498);border-radius:3px}
.lawn{position:relative;padding:8px 0 24px;overflow:hidden}
.stone-path{position:absolute;left:50%;transform:translateX(-50%);top:0;bottom:0;width:22%;
  background:linear-gradient(180deg,rgba(170,155,130,.2),rgba(160,145,120,.5));
  clip-path:polygon(30% 0%,70% 0%,80% 100%,20% 100%)}
.slab{width:50%;height:1.5px;background:rgba(110,100,80,.3);margin:4px auto;border-radius:1px}
.shrub{position:absolute;border-radius:50% 50% 46% 46%}
.sl{background:radial-gradient(ellipse at 38% 33%,#6cc050,#4eaa3a,#38922c)}
.sd{background:radial-gradient(ellipse at 38% 33%,#52a43e,#3c9030,#2a7a22)}
.fl{position:absolute;width:5px;height:5px;border-radius:50%;opacity:.55}
.bbar{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:rgba(0,0,0,.12)}
.badge{background:rgba(0,0,0,.3);color:#fff;font-size:11px;padding:3px 12px;border-radius:20px;font-weight:700}
.mcnt{color:rgba(255,255,255,.6);font-size:12px;font-weight:700}
</style>
</head>
<body>
<div class="scene">
  <div class="sky-area">
    <div class="cloud" style="width:80px;height:24px;top:4px;left:2%"></div>
    <div class="cloud" style="width:55px;height:18px;top:2px;left:38%"></div>
    <div class="cloud" style="width:65px;height:20px;top:8px;right:5%"></div>
  </div>
  <div class="board-area">
    <div class="board-frame"><div class="board-grid" id="board"></div></div>
  </div>
  <div class="garden-area">
    <div class="hills">
      <div class="hill hf" style="width:35%;height:65%;left:-5%"></div>
      <div class="hill hf" style="width:28%;height:50%;left:16%"></div>
      <div class="hill hf" style="width:38%;height:60%;right:-4%"></div>
      <div class="hill hf" style="width:22%;height:45%;right:20%"></div>
      <div class="hill hn" style="width:48%;height:36%;left:5%"></div>
      <div class="hill hn" style="width:42%;height:40%;right:0%"></div>
    </div>
    <div class="wall"></div>
    <div class="lawn">
      <div class="stone-path">
        <div style="padding-top:4px">
          <div class="slab" style="width:36%"></div><div class="slab" style="width:42%"></div>
          <div class="slab" style="width:50%"></div><div class="slab" style="width:58%"></div>
          <div class="slab" style="width:64%"></div><div class="slab" style="width:70%"></div>
        </div>
      </div>
      <div class="shrub sd" style="width:44px;height:32px;bottom:6px;left:3%"></div>
      <div class="shrub sl" style="width:34px;height:24px;bottom:12px;left:13%"></div>
      <div class="shrub sl" style="width:38px;height:26px;bottom:0;left:7%"></div>
      <div class="shrub sd" style="width:28px;height:20px;bottom:14px;left:24%"></div>
      <div class="shrub sl" style="width:42px;height:30px;bottom:8px;right:4%"></div>
      <div class="shrub sd" style="width:32px;height:22px;bottom:14px;right:15%"></div>
      <div class="shrub sd" style="width:36px;height:26px;bottom:0;right:8%"></div>
      <div class="shrub sl" style="width:26px;height:18px;bottom:16px;right:25%"></div>
      <div class="fl" style="background:#FF7085;bottom:14px;left:20%"></div>
      <div class="fl" style="background:#FBBF24;bottom:18px;left:10%"></div>
      <div class="fl" style="background:#A78BFA;bottom:16px;right:18%"></div>
      <div class="fl" style="background:#38BDF8;bottom:20px;right:10%"></div>
      <div class="fl" style="background:#2DD4BF;bottom:10px;left:28%"></div>
    </div>
    <div class="bbar"><div class="mcnt">✦ 36</div><div class="badge">Level 2 ›</div></div>
  </div>
</div>
<script>
const P={
starfish:`<svg viewBox="0 0 100 100"><defs><radialGradient id="sg" cx=".38" cy=".32"><stop offset="0%" stop-color="#FFB8C4"/><stop offset="45%" stop-color="#FF7085"/><stop offset="100%" stop-color="#CC4458"/></radialGradient></defs><path d="M50 8C53 18 56 26 64 26C64 26 78 16 82 18C80 24 72 34 70 38C76 42 88 44 90 48C86 52 74 52 68 54C70 60 78 74 76 78C72 76 60 68 56 64C52 70 52 82 50 86C48 82 48 70 44 64C40 68 28 76 24 78C22 74 30 60 32 54C26 52 14 52 10 48C12 44 24 42 30 38C28 34 20 24 18 18C22 16 36 26 36 26C44 26 47 18 50 8Z" fill="url(#sg)"/><path d="M50 8C47 18 44 26 36 26C36 26 22 16 18 18C20 24 28 34 30 38C24 42 12 44 10 48C14 52 26 52 32 54C30 60 22 74 24 78C28 76 40 68 44 64C48 70 48 82 50 86" fill="rgba(0,0,0,.1)"/><ellipse cx="38" cy="32" rx="8" ry="10" fill="rgba(255,255,255,.25)" transform="rotate(-15 38 32)"/><ellipse cx="34" cy="24" rx="4" ry="5" fill="rgba(255,255,255,.15)"/></svg>`,
turtle:`<svg viewBox="0 0 100 100"><defs><radialGradient id="tg" cx=".38" cy=".32"><stop offset="0%" stop-color="#70ECD8"/><stop offset="45%" stop-color="#2DD4BF"/><stop offset="100%" stop-color="#18946E"/></radialGradient></defs><ellipse cx="50" cy="14" rx="10" ry="11" fill="#24BA9E"/><ellipse cx="16" cy="42" rx="11" ry="8" fill="#24BA9E" transform="rotate(-20 16 42)"/><ellipse cx="84" cy="42" rx="11" ry="8" fill="#24BA9E" transform="rotate(20 84 42)"/><ellipse cx="24" cy="78" rx="9" ry="7" fill="#24BA9E" transform="rotate(30 24 78)"/><ellipse cx="76" cy="78" rx="9" ry="7" fill="#24BA9E" transform="rotate(-30 76 78)"/><ellipse cx="50" cy="52" rx="32" ry="30" fill="url(#tg)"/><ellipse cx="50" cy="52" rx="32" ry="30" fill="rgba(0,0,0,.08)" style="clip-path:inset(0 0 0 52%)"/><ellipse cx="50" cy="50" rx="20" ry="18" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="1.8"/><circle cx="42" cy="42" r="6" fill="rgba(0,0,0,.07)"/><circle cx="58" cy="40" r="6" fill="rgba(0,0,0,.07)"/><circle cx="50" cy="56" r="7" fill="rgba(0,0,0,.07)"/><ellipse cx="40" cy="36" rx="7" ry="9" fill="rgba(255,255,255,.2)" transform="rotate(-12 40 36)"/><circle cx="46" cy="13" r="3" fill="#0C5040"/><circle cx="54" cy="13" r="3" fill="#0C5040"/></svg>`,
shell:`<svg viewBox="0 0 100 100"><defs><radialGradient id="shg" cx=".36" cy=".28"><stop offset="0%" stop-color="#FFE070"/><stop offset="40%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#B88410"/></radialGradient></defs><path d="M50 10C34 10 14 24 10 48C8 62 14 76 26 84C34 90 42 92 50 92C58 92 66 90 74 84C86 76 92 62 90 48C86 24 66 10 50 10Z" fill="url(#shg)"/><path d="M50 10C34 10 14 24 10 48C8 62 14 76 26 84C34 90 42 92 50 92C50 52 50 10 50 10Z" fill="rgba(0,0,0,.1)"/><path d="M50 12Q42 50 38 88" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="1.8"/><path d="M50 12Q34 40 22 72" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="1.5"/><path d="M50 12Q58 50 62 88" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="1.8"/><path d="M50 12Q66 40 78 72" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="1.5"/><ellipse cx="38" cy="30" rx="8" ry="12" fill="rgba(255,255,255,.2)" transform="rotate(-8 38 30)"/></svg>`,
jellyfish:`<svg viewBox="0 0 100 100"><defs><radialGradient id="jg" cx=".38" cy=".30"><stop offset="0%" stop-color="#CCBAFF"/><stop offset="40%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#6C4CC0"/></radialGradient></defs><path d="M14 52Q10 28 20 16Q30 6 50 4Q70 6 80 16Q90 28 86 52Q72 58 50 54Q28 58 14 52Z" fill="url(#jg)"/><path d="M14 52Q10 28 20 16Q30 6 50 4Q50 30 14 52Z" fill="rgba(0,0,0,.09)"/><ellipse cx="36" cy="22" rx="9" ry="12" fill="rgba(255,255,255,.2)" transform="rotate(-10 36 22)"/><path d="M26 54Q20 68 24 78Q28 86 24 94" fill="none" stroke="#B8A0F4" stroke-width="4.5" stroke-linecap="round" opacity=".8"/><path d="M40 56Q36 72 40 82Q44 90 40 96" fill="none" stroke="#B8A0F4" stroke-width="4" stroke-linecap="round" opacity=".7"/><path d="M56 55Q60 72 56 82Q52 90 56 96" fill="none" stroke="#B8A0F4" stroke-width="4" stroke-linecap="round" opacity=".75"/><path d="M72 53Q78 66 74 76Q70 84 74 92" fill="none" stroke="#B8A0F4" stroke-width="4.5" stroke-linecap="round" opacity=".8"/><circle cx="40" cy="32" r="5" fill="rgba(255,255,255,.6)"/><circle cx="41" cy="33" r="2.5" fill="#4C2CA0"/><circle cx="60" cy="32" r="5" fill="rgba(255,255,255,.6)"/><circle cx="61" cy="33" r="2.5" fill="#4C2CA0"/></svg>`,
drop:`<svg viewBox="0 0 100 100"><defs><radialGradient id="dg" cx=".38" cy=".35"><stop offset="0%" stop-color="#80DAFF"/><stop offset="40%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#1480C0"/></radialGradient></defs><path d="M50 6C46 16 36 30 26 46Q14 64 16 76Q18 86 28 92Q36 96 50 96Q64 96 72 92Q82 86 84 76Q86 64 74 46C64 30 54 16 50 6Z" fill="url(#dg)"/><path d="M50 6C46 16 36 30 26 46Q14 64 16 76Q18 86 28 92Q36 96 50 96Q50 50 50 6Z" fill="rgba(0,0,0,.09)"/><ellipse cx="38" cy="48" rx="7" ry="14" fill="rgba(255,255,255,.22)" transform="rotate(-10 38 48)"/><circle cx="36" cy="36" r="5" fill="rgba(255,255,255,.15)"/></svg>`
};
const keys=['starfish','turtle','shell','jellyfish','drop'];
const board=document.getElementById('board');
for(let r=0;r<9;r++){
  for(let c=0;c<9;c++){
    const cell=document.createElement('div');
    cell.className='gc';
    const isObs=(r>=5&&c<6)||(r>=4&&c<4)||(r>=3&&c<2)||(r===3&&c===2);
    if(isObs){
      cell.classList.add('obs');
      const b=document.createElement('div');b.className='obs-block';
      b.innerHTML=`<div class="obs-stamp"><svg viewBox="0 0 100 100"><path d="M50 18Q32 22 24 44Q22 62 32 74Q42 84 50 84Q58 84 68 74Q78 62 76 44Q68 22 50 18Z" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="3"/></svg></div>`;
      cell.appendChild(b);
    }else{
      cell.innerHTML=P[keys[Math.floor(Math.random()*keys.length)]];
    }
    board.appendChild(cell);
  }
}
</script>
</body>
</html>
