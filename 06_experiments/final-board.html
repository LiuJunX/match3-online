<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水晶海洋 · 完整棋盘</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#0a0c10;color:#ddd;min-height:100vh;display:flex;flex-direction:column;align-items:center}

.scene{width:100%;max-width:480px;position:relative;overflow:hidden;aspect-ratio:9/16;margin:0 auto}

/* ---- Background layers ---- */
.bg-sky{position:absolute;inset:0;background:linear-gradient(180deg,#1a6fa0 0%,#5ab4d6 28%,#8cd4e8 45%,#c4e8f0 58%,#e0f0e0 68%,#a8d4a0 75%,#78b470 82%,#5a9458 100%)}
.bg-clouds{position:absolute;top:2%;left:0;right:0;height:30%;overflow:hidden;opacity:.6}
.cloud{position:absolute;background:rgba(255,255,255,.7);border-radius:50%;filter:blur(8px)}
.bg-ocean{position:absolute;bottom:0;left:0;right:0;height:25%;background:linear-gradient(180deg,#3a9aba 0%,#2878a0 40%,#1a5a80 100%);opacity:.4}
.bg-wave{position:absolute;bottom:24%;left:-10%;width:120%;height:6%;background:rgba(180,220,240,.15);border-radius:50%;animation:wave 4s ease-in-out infinite alternate}
.bg-wave:nth-child(2){bottom:22%;animation-delay:-.8s;opacity:.7;width:110%;left:-5%}
@keyframes wave{0%{transform:translateX(-2%)}100%{transform:translateX(2%)}}

/* Ground / terrace */
.bg-ground{position:absolute;bottom:0;left:0;right:0;height:32%;overflow:hidden}
.terrace{position:absolute;bottom:0;left:0;right:0;height:100%}
.terrace-grass{position:absolute;bottom:0;left:0;right:0;height:80%;background:linear-gradient(180deg,#5a9a4e,#4a8840,#3a7232)}
.terrace-wall{position:absolute;bottom:70%;left:8%;right:8%;height:16%;background:linear-gradient(180deg,#c8b8a0,#a89880);border-radius:4px 4px 0 0}
.terrace-wall::before{content:'';position:absolute;top:-8px;left:-2%;right:-2%;height:10px;background:linear-gradient(180deg,#d4c4ac,#b8a890);border-radius:4px}
/* Path leading to board */
.path{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30%;height:75%;background:linear-gradient(180deg,transparent 0%,rgba(180,165,140,.3) 20%,rgba(168,152,128,.5) 100%);clip-path:polygon(35% 0%,65% 0%,80% 100%,20% 100%);opacity:.6}
.path-lines{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:24%}
.path-line{height:2px;background:rgba(140,128,108,.3);margin:6px auto;border-radius:1px}

/* Decorative trees/bushes */
.bush{position:absolute;border-radius:50%;background:radial-gradient(circle at 40% 35%,#6ab455,#4a9440,#388030)}
.bush-shadow{position:absolute;border-radius:50%;background:rgba(0,0,0,.1)}

/* Coral decorations */
.coral{position:absolute;border-radius:40% 40% 0 0}

/* ---- Board ---- */
.board-container{position:absolute;top:5%;left:5%;right:5%;display:flex;flex-direction:column}
.board-frame{background:linear-gradient(160deg,#88c4b8,#6aaa9e,#5a9a90,#4a8880);border-radius:14px;padding:5px;box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.2);position:relative}
.board-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);border-radius:14px 14px 0 0;pointer-events:none}
.board-grid{width:100%;background:#ccc2b4;border-radius:10px;display:grid;grid-template-columns:repeat(9,1fr);gap:1.5px;padding:3px;box-shadow:inset 0 2px 6px rgba(0,0,0,.12)}

/* Grid cells */
.gc{display:flex;align-items:center;justify-content:center;border-radius:4px;background:rgba(186,176,162,.45);position:relative;overflow:visible;aspect-ratio:1}
.gc svg{width:92%;height:92%;transition:transform .12s ease;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.3))}
.gc:hover svg{transform:scale(1.12)}

/* Obstacle */
.gc.obs{background:rgba(155,136,112,.35)}
.obs-block{width:88%;height:88%;border-radius:18%;background:linear-gradient(145deg,#a8926e,#907a5c,#7a6a50);position:relative;overflow:hidden;box-shadow:inset 0 2px 0 rgba(255,255,255,.1),inset 0 -2px 0 rgba(0,0,0,.15),1px 2px 4px rgba(0,0,0,.2)}
.obs-block::before{content:'';position:absolute;top:0;left:0;width:45%;height:45%;background:rgba(255,255,255,.07);border-radius:18% 0 40% 0}
.obs-stamp{position:absolute;inset:22%;opacity:.18}
.obs-stamp svg{width:100%;height:100%}

/* Level bar */
.level-bar{position:absolute;bottom:2%;left:4%;right:4%;height:5%;display:flex;align-items:center;justify-content:space-between;padding:0 12px}
.level-badge{background:rgba(0,0,0,.35);color:#fff;font-size:11px;padding:4px 14px;border-radius:20px;font-weight:700;backdrop-filter:blur(4px)}
.moves{color:rgba(255,255,255,.7);font-size:12px;font-weight:700}
</style>
</head>
<body>

<div class="scene">
  <!-- ===== BACKGROUND ===== -->
  <div class="bg-sky"></div>

  <!-- Clouds -->
  <div class="bg-clouds">
    <div class="cloud" style="width:100px;height:40px;top:15%;left:5%"></div>
    <div class="cloud" style="width:70px;height:30px;top:8%;left:60%"></div>
    <div class="cloud" style="width:120px;height:36px;top:22%;left:70%"></div>
    <div class="cloud" style="width:60px;height:24px;top:5%;left:35%"></div>
  </div>

  <!-- Distant ocean hint -->
  <div class="bg-ocean"></div>
  <div class="bg-wave"></div>
  <div class="bg-wave"></div>

  <!-- Ground terrace -->
  <div class="bg-ground">
    <div class="terrace">
      <div class="terrace-grass"></div>
      <div class="terrace-wall"></div>
    </div>
    <div class="path">
      <div class="path-lines">
        <div class="path-line" style="width:60%"></div>
        <div class="path-line" style="width:70%"></div>
        <div class="path-line" style="width:80%"></div>
        <div class="path-line" style="width:90%"></div>
        <div class="path-line" style="width:95%"></div>
        <div class="path-line" style="width:100%"></div>
      </div>
    </div>
    <!-- Bushes -->
    <div class="bush" style="width:60px;height:50px;bottom:40%;left:4%"></div>
    <div class="bush" style="width:45px;height:38px;bottom:45%;left:18%"></div>
    <div class="bush" style="width:55px;height:45px;bottom:42%;right:6%"></div>
    <div class="bush" style="width:40px;height:35px;bottom:48%;right:22%"></div>
    <div class="bush" style="width:70px;height:30px;bottom:30%;left:10%"></div>
    <div class="bush" style="width:65px;height:28px;bottom:32%;right:12%"></div>
    <!-- Small corals at base -->
    <div class="coral" style="width:14px;height:20px;background:linear-gradient(0deg,#d06870,#e88888);bottom:58%;left:28%;opacity:.5"></div>
    <div class="coral" style="width:10px;height:16px;background:linear-gradient(0deg,#e8a040,#f0c060);bottom:56%;right:30%;opacity:.5"></div>
  </div>

  <!-- ===== BOARD ===== -->
  <div class="board-container">
    <div class="board-frame">
      <div class="board-grid" id="board"></div>
    </div>
  </div>

  <!-- Level bar -->
  <div class="level-bar">
    <div class="moves">✦ 36</div>
    <div class="level-badge">Level 2 ›</div>
  </div>
</div>

<script>
// ============ PIECE SVGs ============
// Each piece is a chunky, rounded, candy-like shape that fills the viewBox uniformly.
// The overall bounding is similar across pieces for even grid presence.
// Unified top-left highlight, bottom-right shadow.

const P = {
  // Starfish: chunky rounded five-arm star, very puffy
  starfish: `<svg viewBox="0 0 100 100">
    <defs><radialGradient id="sg" cx=".38" cy=".32"><stop offset="0%" stop-color="#FFB8C4"/><stop offset="45%" stop-color="#FF7085"/><stop offset="100%" stop-color="#CC4458"/></radialGradient></defs>
    <path d="M50 8C53 18 56 26 64 26C64 26 78 16 82 18C80 24 72 34 70 38C76 42 88 44 90 48C86 52 74 52 68 54C70 60 78 74 76 78C72 76 60 68 56 64C52 70 52 82 50 86C48 82 48 70 44 64C40 68 28 76 24 78C22 74 30 60 32 54C26 52 14 52 10 48C12 44 24 42 30 38C28 34 20 24 18 18C22 16 36 26 36 26C44 26 47 18 50 8Z" fill="url(#sg)"/>
    <path d="M50 8C47 18 44 26 36 26C36 26 22 16 18 18C20 24 28 34 30 38C24 42 12 44 10 48C14 52 26 52 32 54C30 60 22 74 24 78C28 76 40 68 44 64C48 70 48 82 50 86" fill="rgba(0,0,0,.1)"/>
    <ellipse cx="38" cy="32" rx="8" ry="10" fill="rgba(255,255,255,.25)" transform="rotate(-15 38 32)"/>
    <ellipse cx="34" cy="24" rx="4" ry="5" fill="rgba(255,255,255,.15)"/>
  </svg>`,

  // Turtle: round shell with tiny head & flippers peeking out, compact
  turtle: `<svg viewBox="0 0 100 100">
    <defs><radialGradient id="tg" cx=".38" cy=".32"><stop offset="0%" stop-color="#70ECD8"/><stop offset="45%" stop-color="#2DD4BF"/><stop offset="100%" stop-color="#18946E"/></radialGradient></defs>
    <!-- flippers & head -->
    <ellipse cx="50" cy="14" rx="10" ry="11" fill="#24BA9E"/>
    <ellipse cx="16" cy="42" rx="11" ry="8" fill="#24BA9E" transform="rotate(-20 16 42)"/>
    <ellipse cx="84" cy="42" rx="11" ry="8" fill="#24BA9E" transform="rotate(20 84 42)"/>
    <ellipse cx="24" cy="78" rx="9" ry="7" fill="#24BA9E" transform="rotate(30 24 78)"/>
    <ellipse cx="76" cy="78" rx="9" ry="7" fill="#24BA9E" transform="rotate(-30 76 78)"/>
    <!-- main shell -->
    <ellipse cx="50" cy="52" rx="32" ry="30" fill="url(#tg)"/>
    <ellipse cx="50" cy="52" rx="32" ry="30" fill="rgba(0,0,0,.08)" style="clip-path:inset(0 0 0 52%)"/>
    <!-- shell segments -->
    <ellipse cx="50" cy="50" rx="20" ry="18" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="1.8"/>
    <circle cx="42" cy="42" r="6" fill="rgba(0,0,0,.07)"/>
    <circle cx="58" cy="40" r="6" fill="rgba(0,0,0,.07)"/>
    <circle cx="50" cy="56" r="7" fill="rgba(0,0,0,.07)"/>
    <circle cx="38" cy="58" r="5" fill="rgba(0,0,0,.06)"/>
    <circle cx="62" cy="58" r="5" fill="rgba(0,0,0,.06)"/>
    <ellipse cx="40" cy="36" rx="7" ry="9" fill="rgba(255,255,255,.2)" transform="rotate(-12 40 36)"/>
    <!-- eyes -->
    <circle cx="46" cy="13" r="3" fill="#0C5040"/><circle cx="45.5" cy="12.5" r="1.2" fill="rgba(255,255,255,.5)"/>
    <circle cx="54" cy="13" r="3" fill="#0C5040"/><circle cx="53.5" cy="12.5" r="1.2" fill="rgba(255,255,255,.5)"/>
  </svg>`,

  // Shell: plump scallop shell, fan shape, very chunky
  shell: `<svg viewBox="0 0 100 100">
    <defs><radialGradient id="shg" cx=".36" cy=".28"><stop offset="0%" stop-color="#FFE070"/><stop offset="40%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#B88410"/></radialGradient></defs>
    <path d="M50 10C34 10 14 24 10 48C8 62 14 76 26 84C34 90 42 92 50 92C58 92 66 90 74 84C86 76 92 62 90 48C86 24 66 10 50 10Z" fill="url(#shg)"/>
    <path d="M50 10C34 10 14 24 10 48C8 62 14 76 26 84C34 90 42 92 50 92C50 52 50 10 50 10Z" fill="rgba(0,0,0,.1)"/>
    <!-- ridges -->
    <path d="M50 12Q42 50 38 88" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="1.8"/>
    <path d="M50 12Q34 40 22 72" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="1.5"/>
    <path d="M50 12Q58 50 62 88" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="1.8"/>
    <path d="M50 12Q66 40 78 72" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="1.5"/>
    <path d="M50 12Q72 30 88 50" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1.2"/>
    <path d="M50 12Q28 30 12 50" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1.2"/>
    <ellipse cx="38" cy="30" rx="8" ry="12" fill="rgba(255,255,255,.2)" transform="rotate(-8 38 30)"/>
    <circle cx="36" cy="20" r="4" fill="rgba(255,255,255,.12)"/>
  </svg>`,

  // Jellyfish: dome + tentacles, compact and chunky dome
  jellyfish: `<svg viewBox="0 0 100 100">
    <defs><radialGradient id="jg" cx=".38" cy=".30"><stop offset="0%" stop-color="#CCBAFF"/><stop offset="40%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#6C4CC0"/></radialGradient></defs>
    <!-- dome -->
    <path d="M14 52Q10 28 20 16Q30 6 50 4Q70 6 80 16Q90 28 86 52Q72 58 50 54Q28 58 14 52Z" fill="url(#jg)"/>
    <path d="M14 52Q10 28 20 16Q30 6 50 4Q50 30 14 52Z" fill="rgba(0,0,0,.09)"/>
    <ellipse cx="36" cy="22" rx="9" ry="12" fill="rgba(255,255,255,.2)" transform="rotate(-10 36 22)"/>
    <!-- tentacles -->
    <path d="M26 54Q20 68 24 78Q28 86 24 94" fill="none" stroke="#B8A0F4" stroke-width="4.5" stroke-linecap="round" opacity=".8"/>
    <path d="M40 56Q36 72 40 82Q44 90 40 96" fill="none" stroke="#B8A0F4" stroke-width="4" stroke-linecap="round" opacity=".7"/>
    <path d="M56 55Q60 72 56 82Q52 90 56 96" fill="none" stroke="#B8A0F4" stroke-width="4" stroke-linecap="round" opacity=".75"/>
    <path d="M72 53Q78 66 74 76Q70 84 74 92" fill="none" stroke="#B8A0F4" stroke-width="4.5" stroke-linecap="round" opacity=".8"/>
    <!-- eyes -->
    <circle cx="40" cy="32" r="5" fill="rgba(255,255,255,.6)"/><circle cx="41" cy="33" r="2.5" fill="#4C2CA0"/>
    <circle cx="60" cy="32" r="5" fill="rgba(255,255,255,.6)"/><circle cx="61" cy="33" r="2.5" fill="#4C2CA0"/>
  </svg>`,

  // Drop: big plump water drop, very chunky and rounded bottom
  drop: `<svg viewBox="0 0 100 100">
    <defs><radialGradient id="dg" cx=".38" cy=".35"><stop offset="0%" stop-color="#80DAFF"/><stop offset="40%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#1480C0"/></radialGradient></defs>
    <path d="M50 6C46 16 36 30 26 46Q14 64 16 76Q18 86 28 92Q36 96 50 96Q64 96 72 92Q82 86 84 76Q86 64 74 46C64 30 54 16 50 6Z" fill="url(#dg)"/>
    <path d="M50 6C46 16 36 30 26 46Q14 64 16 76Q18 86 28 92Q36 96 50 96Q50 50 50 6Z" fill="rgba(0,0,0,.09)"/>
    <ellipse cx="38" cy="48" rx="7" ry="14" fill="rgba(255,255,255,.22)" transform="rotate(-10 38 48)"/>
    <circle cx="36" cy="36" r="5" fill="rgba(255,255,255,.15)"/>
  </svg>`
};

const keys = ['starfish','turtle','shell','jellyfish','drop'];

// Build board
const board = document.getElementById('board');
const R=8, C=9;
for(let r=0;r<R;r++){
  for(let c=0;c<C;c++){
    const cell = document.createElement('div');
    cell.className = 'gc';
    // obstacle pattern matching reference: irregular frontier
    const isObs = (r>=4 && c<6) || (r>=3 && c<4) || (r>=2 && c<2) || (r===2 && c===2);
    if(isObs){
      cell.classList.add('obs');
      const blk = document.createElement('div');
      blk.className = 'obs-block';
      // embossed shell stamp
      blk.innerHTML = `<div class="obs-stamp"><svg viewBox="0 0 100 100"><path d="M50 15Q30 20 20 45Q18 65 30 78Q40 88 50 88Q60 88 70 78Q82 65 80 45Q70 20 50 15Z" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="3"/><line x1="50" y1="15" x2="40" y2="80" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/><line x1="50" y1="15" x2="60" y2="80" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/></svg></div>`;
      cell.appendChild(blk);
    } else {
      const k = keys[Math.floor(Math.random()*keys.length)];
      cell.innerHTML = P[k];
    }
    board.appendChild(cell);
  }
}
</script>
</body>
</html>
