<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配色优化方案对比</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#0a0c10;color:#e0ddd6;min-height:100vh}
.header{text-align:center;padding:36px 20px 8px}
.header h1{font-size:22px;font-weight:700;color:#eee}
.header p{color:#555;font-size:13px;margin-top:6px;line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:0 12px 60px}
.schemes{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:24px 0}
@media(max-width:800px){.schemes{grid-template-columns:1fr}}
.scheme-card{background:#12141a;border-radius:16px;padding:16px;border:2px solid #1e2028;transition:border-color .3s}
.scheme-card.current{border-color:#555}
.scheme-card.a{border-color:#4A90C8}
.scheme-card.b{border-color:#2A7868}
.scheme-card.c{border-color:#C8A040}
.scheme-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.scheme-name{font-size:15px;font-weight:700}
.scheme-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.scheme-desc{font-size:11px;color:#666;margin-bottom:12px;line-height:1.6}
/* Palette strip */
.palette{display:flex;gap:4px;margin-bottom:10px;align-items:flex-end}
.swatch{display:flex;flex-direction:column;align-items:center;gap:2px}
.swatch-color{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.1)}
.swatch-label{font-size:8px;color:#555;white-space:nowrap}
.swatch-hex{font-size:8px;color:#444;font-family:monospace}
.swatch-sm .swatch-color{width:24px;height:24px;border-radius:6px}
/* Board */
.board-scene{border-radius:14px;padding:8px;position:relative;overflow:hidden}
.board-frame{border-radius:10px;padding:4px;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 2px 6px rgba(0,0,0,.3)}
.board-grid{border-radius:8px;padding:3px;display:grid;gap:2px;grid-template-columns:repeat(9,1fr)}
.grid-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px}
.grid-cell svg{width:94%;height:94%;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.25))}
/* HSV stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.stat{background:#0e1016;border-radius:8px;padding:6px 8px;text-align:center}
.stat-label{font-size:9px;color:#555;margin-bottom:2px}
.stat-val{font-size:12px;font-weight:600}
/* Note */
.note{background:#13151c;border-left:3px solid #38BDF8;padding:12px 16px;border-radius:0 10px 10px 0;font-size:12px;line-height:1.8;color:#777;margin:16px 0}
.note strong{color:#bbb;font-weight:500}
.fix-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:600}
.fix-tag.good{background:rgba(45,212,191,.15);color:#2DD4BF}
.fix-tag.warn{background:rgba(251,191,36,.15);color:#FBBF24}
</style>
</head>
<body>
<div class="header">
  <h1>配色优化方案对比</h1>
  <p>基于 H/S/V 三维度分析，保持海洋主题不变，提供三套优化方向</p>
</div>
<div class="container">

<div class="note">
  <strong>共同修正目标：</strong>
  ① 底板暖色→冷色 <span class="fix-tag good">7/7参考均冷底</span>
  ② 水母饱和度 44%→70%+ <span class="fix-tag good">拉齐棋子S</span>
  ③ 海星饱和度 56%→70%+ <span class="fix-tag good">拉齐棋子S</span>
  ④ 海龟-鱼色相差 26°→50°+ <span class="fix-tag good">防混淆</span>
  ⑤ 整体明度下压 <span class="fix-tag good">留出特效空间</span>
</div>

<div class="schemes" id="schemes"></div>

</div>

      fish:      {id:'c3f', mid:'#2888E0', hi:'#60B0F8', lo:'#1060B0', eye:'#084070'},
    },
    stats: {boardH:224, boardS:13, boardV:82, pieceSRange:'75-87', pieceVRange:'78-88', turtleFishGap:70}
  },
  {
    key: 'vivid', cls: 'c', name: '方案V · 艳丽版', tag: '高饱和', tagColor: '#F43060',
    desc: '基于v6，饱和度全部拉到80-92%，明度提到85-96%。糖果感最强，视觉冲击力最大。黄色仍做感知亮度补偿(V=90%)。',
    board: '#B4BED0', frame: '#D0A040', cellBg: 'rgba(155,162,182,.3)',
    boardScene: 'linear-gradient(180deg,#A0A8C0 0%,#B8C2D4 30%,#ACB4C8 100%)',
    frameBg: 'linear-gradient(145deg,#D8B048,#C09838,#D0A840)',
    gridGap: '1px',
    pieceSize: '99%',
    colors: {
      starfish:  {id:'vs', mid:'#F23C5A', hi:'#FC7E93', lo:'#AD2239'},
      turtle:    {id:'vt', mid:'#0BED7C', hi:'#47EF9B', lo:'#01A151', eye:'#034725'},
      shell:     {id:'vh', mid:'#FCB80C', hi:'#FFCC4C', lo:'#AB7B01'},
      jellyfish: {id:'vj', mid:'#9A2AFC', hi:'#B96BFF', lo:'#6516AB', tent:'#AE57F9', eye:'#330C55'},
      fish:      {id:'vf', mid:'#118AFC', hi:'#51ABFF', lo:'#055BAB', eye:'#042D54'},
    },
    stats: {boardH:224, boardS:13, boardV:82, pieceSRange:'80-92', pieceVRange:'80-96', turtleFishGap:59}
  },
];

// ============================================================
//  Render
// ============================================================
let seed = 99;
function rand(){seed=(seed*16807+0)%2147483647;return seed/2147483647;}

const pieceFns = [starfish, turtle, shell, jellyfish, fish];
const pieceNames = ['海星','海龟','贝壳','水母','鱼'];
const pieceKeys = ['starfish','turtle','shell','jellyfish','fish'];

const container = document.getElementById('schemes');

schemes.forEach(scheme => {
  const card = document.createElement('div');
  card.className = 'scheme-card ' + scheme.cls;

  // Header
  let html = `<div class="scheme-header">
    <div class="scheme-name">${scheme.name}</div>
    <span class="scheme-tag" style="background:${scheme.tagColor}22;color:${scheme.tagColor}">${scheme.tag}</span>
  </div>
  <div class="scheme-desc">${scheme.desc}</div>`;

  // Palette strip
  html += `<div class="palette">`;
  // Board + frame
  html += `<div class="swatch swatch-sm"><div class="swatch-color" style="background:${scheme.board}"></div><div class="swatch-label">底板</div></div>`;
  html += `<div class="swatch swatch-sm"><div class="swatch-color" style="background:${scheme.frame}"></div><div class="swatch-label">边框</div></div>`;
  html += `<div style="width:8px"></div>`;
  // Pieces
  pieceKeys.forEach((k,i) => {
    html += `<div class="swatch"><div class="swatch-color" style="background:${scheme.colors[k].mid}"></div><div class="swatch-label">${pieceNames[i]}</div></div>`;
  });
  html += `</div>`;

  // Board
  html += `<div class="board-scene" style="background:${scheme.boardScene}">
    <div class="board-frame" style="background:${scheme.frameBg}">
      <div class="board-grid" style="background:${scheme.board};${scheme.gridGap ? 'gap:'+scheme.gridGap : ''}" id="board-${scheme.key}"></div>
    </div>
  </div>`;

  // Stats
  html += `<div class="stats">
    <div class="stat"><div class="stat-label">底板色相</div><div class="stat-val" style="color:${scheme.stats.boardH < 60 || scheme.stats.boardH > 300 ? '#E85050' : '#2DD4BF'}">H=${scheme.stats.boardH}° ${scheme.stats.boardH < 60 || scheme.stats.boardH > 300 ? '暖' : '冷'}</div></div>
    <div class="stat"><div class="stat-label">棋子饱和度</div><div class="stat-val" style="color:${scheme.stats.pieceSRange.startsWith('4') ? '#E88040' : '#2DD4BF'}">S=${scheme.stats.pieceSRange}%</div></div>
    <div class="stat"><div class="stat-label">龟-鱼色相差</div><div class="stat-val" style="color:${scheme.stats.turtleFishGap < 40 ? '#E85050' : '#2DD4BF'}">ΔH=${scheme.stats.turtleFishGap}°</div></div>
  </div>`;

  card.innerHTML = html;
  container.appendChild(card);

  // Fill board
  seed = 99;
  const boardEl = document.getElementById('board-' + scheme.key);
  for(let r=0;r<8;r++){
    for(let c=0;c<9;c++){
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.style.background = scheme.cellBg;
      const idx = Math.floor(rand()*5);
      cell.innerHTML = pieceFns[idx](scheme.colors);
      if (scheme.pieceSize) cell.querySelector('svg').style.cssText = 'width:'+scheme.pieceSize+';height:'+scheme.pieceSize+';filter:drop-shadow(1px 2px 2px rgba(0,0,0,.25))';
      boardEl.appendChild(cell);
    }
  }
});
</script>
</body>
</html>
